name: Deploy to Render (manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Render
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          echo "This workflow expects RENDER_SERVICE_ID and RENDER_API_KEY secrets."
          # Example: curl -X POST https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys -H "Authorization: Bearer $RENDER_API_KEY"
          echo "Manual deploy step — configure Render service and secrets."
